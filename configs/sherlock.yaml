# Sherlock production: disk-on, DUST-FREE, mass-conserving, CONTINUUM-ONLY (ew=0)
# biconical MgII training library, generated NATIVELY (no docker) and SHARDED
# across a SLURM array job. The 6-D LHS varies the WIND only (logN, theta, av,
# incl, vexp_kms, sigmaran_kms); the disk is fixed (see `fixed:` below).
#
# Native mode: host paths == THOR paths, so no mount/extra_args wiring is needed
# (contrast configs/pilot_mac.yaml). Each array task runs one --shard i/K of the
# same LHS design (see scripts/sbatch_sherlock.sh). Resumability is per-sim
# (spectrum.npz marker), so requeues/preemption on the owners partition are
# idempotent. After all shards finish, aggregate once on a login/dev node:
#   uv run python -m biconical_inference.library --config configs/sherlock.yaml
#
# EDIT before submitting: thor.thor_bin (your Sherlock THOR build).
# library.root/out use $SCRATCH (expanded at runtime) — 100 TB, 90-day purge;
# copy the final library.h5 somewhere durable ($OAK/$HOME) after aggregation.

library:
  root: $SCRATCH/bicone_50k        # per-run dirs (high-churn); $SCRATCH is expanded at runtime
  out:  $SCRATCH/bicone_50k/library.h5
  n_sims: 50000                    # production design; LHS re-drawn deterministically from seed
  method: lhs
  seed: 1
  n_cont: 500000                   # 500k continuum photons/sim -> low per-spectrum MC noise
  n_line: 0                        # continuum-only (no MgII emission doublet)
  aperture_kpc: 138.1
  want_mc_var: true
  cleanup_outputs: true            # delete each sim's bulky THOR HDF5 after spectrum.npz is saved

thor:
  mode: native                     # host paths == THOR paths; no docker
  # EDIT: absolute path to the Sherlock THOR build (biconical_model_w/disk, the
  # post-merge commit). Build with ./build.sh --omp (see scripts/sbatch_sherlock.sh
  # and the runbook). Must be a cpu-openmp build with THOR_ENABLE_BICONICALSHELL=ON.
  thor_bin: $HOME/thor/cmake-build-release-omp/src/thor

fixed:
  ew: 0.0                          # continuum-only (no MgII emission doublet)
  sigmasrc_kms: 100.0
  mass_conservation: true          # bicones obey mass conservation: rho ~ r^-(2+a_v)
  outer_radius_box: 0.4            # cone outer radius = 0.4 * 250 kpc box = 100 kpc
                                   #   (matches the 6D_sweep validation; default would be 0.5/125 kpc)
  # --- static disk: ON, fixed, DUST-FREE ---
  disk_on: true
  disk_logN: 14.0                  # fixed disk MgII column [cm^-2]
  disk_radius_box: 0.04            # 10 kpc outer radius (0.04 * 250 kpc box)
  disk_tau_dust: 0.0               # NO dust in the disk
  disk_sigma_kms: 50.0             # disk velocity dispersion [km/s] (unspecified -> default; sets disk line width)
  source: point
  # Disk thickness is fixed at 2 kpc (DISK_HEIGHT_BOX=0.008 in thor_sim/config.py).
  # NO wind/bicone dust: make_conf sets no dust key, so THOR defaults wind dust to 0.

device: auto
