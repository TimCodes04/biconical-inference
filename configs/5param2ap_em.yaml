# [AI-Claude] FIVE-PARAMETER, TWO-APERTURE model with USER-SET viewing angle, trained on
# spectra that MIX IN MgII line emission (EW = 5 Angstrom).
#
# Same architecture and inference contract as configs/5param2ap.yaml: inclination (`incl`) is
# a CONDITIONER the user sets before inference (like the instrument LSF/SNR), so the NPE infers
# 5 parameters — [logN, theta, av, vexp_kms, disk_logN] — and appends the normalized viewing
# angle as a 3rd conditioning descriptor. Conditioning on the KNOWN inclination breaks the
# incl<->theta degeneracy and tightens the other five — this is the accuracy-maximizing setup
# for the "user supplies the viewing angle" workflow.
#
# THE DIFFERENCE FROM 5param2ap: the training spectra contain EW=5 emission, so — unlike
# 5param2ap, which reuses library_2ap.h5 AND emulator_2ap.pt — this family needs FRESH
# artifacts and both are RETRAINED:
#   * library:  NEW library/library_2ap_em.h5 (generated by configs/sherlock_2ap_em.yaml, ew=5)
#   * emulator: NEW checkpoints/emulator_2ap_em.pt (params(6)->spectrum target changed; NOT shared)
#   * NPE:      NEW checkpoints/npe_5param2ap_em.pt (incl conditioner, instrument-conditioned)
#   * splits:   regenerate splits/reserved_test.json for this library before training (see runbook)
# param_bounds MUST match the generation config (configs/sherlock_2ap_em.yaml) — invariant #1.

# ---- training-library (pulled back from Sherlock; identical contract to sherlock_2ap_em.yaml) ----
library:
  root: ./runs_2ap_em
  out: ./library/library_2ap_em.h5    # NEW — emission (EW=5) two-aperture library
  n_sims: 30000
  method: lhs
  seed: 1
  incl_seed: 2
  n_los: 6
  n_cont: 300000
  n_line: 80000                       # EMISSION ON (must match sherlock_2ap_em.yaml)
  aperture_kpc: [20.0, 138.1]
  want_mc_var: true

thor:
  mode: docker
  image: thor-ci-python:local
  thor_bin: thor

# ---- FULL parameter set (6) — matches the library's params_z columns + the emulator input ----
# `context_params` marks the CONDITIONERS (user-set), not inferred. The NPE infers
# free_params minus context_params = [logN, theta, av, vexp_kms, disk_logN] (5-D theta).
free_params: [logN, theta, av, incl, vexp_kms, disk_logN]
context_params: [incl]      # viewing angle: SET BY THE USER, appended as a conditioning descriptor
param_bounds:
  logN:      [11.0, 16.0]
  theta:     [15.0, 82.0]
  av:        [0.5,  2.0]
  incl:      [0.0,  90.0]    # conditioning range; must match INCL_COS_RANGE in npe/instrument.py
  vexp_kms:  [50.0, 600.0]
  disk_logN: [13.0, 16.0]    # MUST match configs/sherlock_2ap_em.yaml (library 1e16 cap)

# ---- fixed (not inferred) — MUST match configs/sherlock_2ap_em.yaml ----
fixed:
  ew: 5.0                   # EMISSION ON: intrinsic MgII doublet EW = 5 Angstrom
  sigmasrc_kms: 100.0       # source line width (sets the doublet-gaussian sigma)
  sigmaran_kms: 100.0       # WIND random velocity — FIXED
  mass_conservation: true
  outer_radius_box: 0.4
  disk_on: true
  disk_radius_box: 0.04
  disk_height_box: 0.004    # 1 kpc thick
  disk_tau_dust: 0.0
  disk_sigma_kms: 50.0
  source: point

# ---- emulator (params(6) -> 2-aperture emission spectrum) — RETRAINED (NOT shared) ----
emulator:
  arch: cnn
  hidden: 256
  latent_ch: 64
  heteroscedastic: true     # per-bin sigma absorbs the (higher) MC noise from the line subrun
  epochs: 400
  batch_size: 256
  lr: 0.001
  val_frac: 0.1
  test_frac: 0.1
  ckpt: ./checkpoints/emulator_2ap_em.pt   # NEW — emission spectra differ from emulator_2ap.pt

# ---- NPE (2-aperture emission spectrum + LSF + SNR + viewing angle -> 5-param posterior) ----
npe:
  density_estimator: nsf
  embedding_features: 24
  hidden_features: 128
  num_transforms: 6
  train_source: library     # train on TRUE THOR emission spectra + real MC noise (closes the gap)
  n_amortized_sims: 400000
  batch_size: 1024
  lr: 0.0005
  stop_after_epochs: 20
  max_num_epochs: 300
  instrument_conditioned: true
  seed: 0
  obs_noise_snr: 30
  ckpt: ./checkpoints/npe_5param2ap_em.pt

device: auto
