# [AI-Claude] SINGLE-APERTURE, FIVE-PARAMETER model with a_v PINNED near 1.
#
# Phase-1 experiment (see the plan / IMPROVEMENT_LOG.md): the r_vir absorption trough cannot
# separate a_v from v_max (mass-conservation degeneracy), so the 6-param corner plots show a
# broad av<->vexp banana. Here we PIN a_v ~ 1 by training the flow ONLY on the real library
# rows whose a_v lies in `npe.av_slice`, and DROP a_v from the inferred parameters. With no a_v
# axis to trade against, v_max should sharpen — and because we train on real THOR spectra (not
# the emulator) the posterior stays calibrated (no emulator-gap overconfidence).
#
# Reuses EVERYTHING from configs/rvir6.yaml except the parameter set + the a_v slice:
#   * library:  REUSES library/library_1ap_rvir.h5 (the 6-column r_vir library; we slice rows)
#   * emulator: REUSES checkpoints/emulator_rvir6.pt (6-param input incl. a_v; only used for the
#               example-fit overlay/band, fed a_v=1.0)
#   * splits:   REUSES splits/reserved_test.json (same library => same fingerprint; the slice is
#               applied ON TOP of the reserved-test exclusion, never replacing it)
# Only the NPE is (re)trained, on the a_v~1 slice. Model is valid only for a_v~1 spectra.

# ---- training-library (the derived single-aperture r_vir slice of library_2ap.h5) ----
library:
  root: ./runs_2ap
  out: ./library/library_1ap_rvir.h5    # 6-column library; a_v spans [0.5,2.0], we slice rows
  n_sims: 30000
  method: lhs
  seed: 1
  incl_seed: 2
  n_los: 6
  n_cont: 300000
  n_line: 0
  aperture_kpc: 138.1                    # r_vir only (single aperture)
  want_mc_var: true
thor:
  mode: docker
  image: thor-ci-python:local
  thor_bin: thor

# ---- 5 free (inferred) parameters — a_v DROPPED (pinned via the row slice below) ----
free_params: [logN, theta, incl, vexp_kms, disk_logN]
param_bounds:
  logN:      [11.0, 16.0]
  theta:     [15.0, 82.0]
  incl:      [0.0,  90.0]
  vexp_kms:  [50.0, 600.0]
  disk_logN: [13.0, 16.0]

# ---- fixed (not inferred) — MUST match the library-generation config ----
fixed:
  ew: 0.0
  sigmasrc_kms: 100.0
  sigmaran_kms: 100.0
  mass_conservation: true
  outer_radius_box: 0.4
  disk_on: true
  disk_radius_box: 0.04
  disk_height_box: 0.004
  disk_tau_dust: 0.0
  disk_sigma_kms: 50.0
  source: point

# ---- emulator (params(6) -> r_vir spectrum) — REUSED, not retrained ----
emulator:
  arch: cnn
  hidden: 256
  latent_ch: 64
  heteroscedastic: true
  epochs: 400
  batch_size: 256
  lr: 0.001
  val_frac: 0.1
  test_frac: 0.1
  ckpt: ./checkpoints/emulator_rvir6.pt   # SHARED with configs/rvir6.yaml (6-D input incl. a_v)

# ---- NPE (r_vir spectrum -> 5-param posterior) ----
npe:
  backend: flow
  density_estimator: nsf
  embedding_features: 24
  hidden_features: 128
  num_transforms: 6
  train_source: library      # train on TRUE THOR spectra (a_v~1 slice) + real MC noise
  av_slice: [0.85, 1.15]     # keep only rows with a_v in this band (~32k after test exclusion);
                             #   tighten to [0.9,1.1] if residual a_v smear shows up in the audit
  n_amortized_sims: 400000
  batch_size: 1024
  lr: 0.0005
  stop_after_epochs: 20
  max_num_epochs: 300
  instrument_conditioned: true
  seed: 0
  obs_noise_snr: 30
  ckpt: ./checkpoints/npe_rvir5_avfix.pt
device: auto
