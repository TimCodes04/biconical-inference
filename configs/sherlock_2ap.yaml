# Sherlock production — TWO-APERTURE + MULTI-LOS biconical MgII training library.
#
# Evolves configs/sherlock_5param.yaml (native THOR, sharded SLURM array, continuum-only,
# dust-free, mass-conserving bicone + fixed disk) with THREE changes:
#   1. TWO apertures per observation: a 20 kpc inner aperture AND r_vir = 138.1 kpc, extracted
#      from the SAME peel data (free). The library spectra gain an aperture axis (N, 2, 256).
#   2. MULTI-LOS peeling (n_los): each transport run is peeled to K inclinations at once, so
#      inclination is sampled per-peel (NOT a design column) — K training rows per transport.
#      Needs the multi-LOS THOR build (commit >= d949a2eb); verify per SHERLOCK.md before submit.
#   3. The DISK MgII column `disk_logN` is now a FREE parameter (was fixed at 14.0), range
#      [13, 16], so the model disentangles disk-ISM absorption from the wind. sigma_ran stays
#      fixed at 100 km/s. Free set: logN, theta, av, incl, vexp_kms, disk_logN.
#
# Inclination is peeled, not designed, so the LHS is over the 5 NON-incl params (logN, theta,
# av, vexp_kms, disk_logN); n_sims is the number of TRANSPORT RUNS (rows = n_sims * n_los).
# Generate -> aggregate -> reserve -> train exactly as in SHERLOCK.md. EDIT before submitting:
# thor.thor_bin. A FRESH library.root is mandatory (never mix with a v1 single-aperture root).

library:
  root: $SCRATCH/bicone_2ap            # per-run dirs (high-churn); $SCRATCH expanded at runtime
  out:  $SCRATCH/bicone_2ap/library_2ap.h5
  n_sims: 30000                        # number of TRANSPORT RUNS (rows = n_sims * n_los)
  method: lhs                          # on-the-fly LHS over the 5 non-incl transport params
  seed: 1
  incl_seed: 2                         # seed for the per-run inclination design (uniform cos i)
  n_los: 6                             # peel each transport to 6 inclinations (THOR warns at 10)
  n_cont: 300000                       # 300k continuum photons/sim (the proven budget)
  n_line: 0                            # continuum-only (no MgII emission doublet)
  aperture_kpc: [20.0, 138.1]          # inner (disk+inner wind) and r_vir (total)
  want_mc_var: true
  cleanup_outputs: true                # delete each sim's bulky THOR HDF5 after spectrum.npz

thor:
  mode: native                         # host paths == THOR paths; no docker
  # The raw binary can't load libacpp-rt.so on the bare host — run THOR through the apptainer
  # WRAPPER (~/thor_acpp.sh), which execs it inside the image. VERIFY the wrapper name with
  # `ls ~/*.sh`, and that the cluster THOR build supports multi-LOS (SHERLOCK.md Phase 5.1).
  thor_bin: $HOME/thor_acpp.sh

# ---- 6 free (inferred) parameters + their constrained physical ranges ----
free_params: [logN, theta, av, incl, vexp_kms, disk_logN]
param_bounds:
  logN:      [11.0, 16.0]   # wind MgII column; extended down to 11 for weak-absorber coverage
  theta:     [15.0, 82.0]   # cone half-opening angle; <82 keeps margin from the disk-clearing cap
  av:        [0.5,  2.0]    # velocity power-law index; no near-constant/extreme laws
  incl:      [0.0,  90.0]   # LOS inclination (uniform on the sphere; peeled, not designed)
  vexp_kms:  [50.0, 600.0]  # v_max at R_H; <600 drops fast low-density gas (uninformative)
  disk_logN: [13.0, 16.0]   # DISK MgII column [cm^-2]; NEW free param (was fixed 14.0).
                            #   Capped at 1e16: above that the disk goes optically thick and
                            #   transport runs runaway-slow (300-1200s) / OOM; 1e16 is the
                            #   physical ceiling for a damped MgII disk anyway.

# ---- fixed (not inferred) ----
fixed:
  ew: 0.0                   # continuum-only (no MgII emission doublet)
  sigmasrc_kms: 100.0       # source line width (unused at ew=0)
  sigmaran_kms: 100.0       # WIND random velocity — FIXED at 100 km/s
  mass_conservation: true   # bicones obey mass conservation: rho ~ r^-(2+a_v)
  outer_radius_box: 0.4     # cone outer radius = 0.4 * 250 kpc box = 100 kpc
  # --- static disk: ON, DUST-FREE, 1 kpc thick; column (disk_logN) is now FREE above ---
  disk_on: true
  disk_radius_box: 0.04     # 10 kpc outer radius (0.04 * 250 kpc box)
  disk_height_box: 0.004    # 1 kpc thick; relaxes the theta-clearing cap to <87.1 deg
  disk_tau_dust: 0.0        # NO dust in the disk
  disk_sigma_kms: 50.0      # disk velocity dispersion [km/s]
  source: point

device: auto
