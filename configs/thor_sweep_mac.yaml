# [AI-Claude] Mac-docker THOR runner for the controlled vexp/av sensitivity sweep
# (scripts/thor_sensitivity.py). Combines the TWO-APERTURE library's fixed params (disk ON —
# so a re-run reproduces library_1ap_rvir spectra) with pilot_mac.yaml's two-mount docker setup
# (the mounted THOR build @ commit 7a26e9cd = the production library's THOR_COMMIT). The script
# only reads `fixed` + `thor`; n_cont comes from --n-cont.

# ---- fixed params — MUST match configs/2ap.yaml / sherlock_2ap.yaml (the library generation) ----
fixed:
  ew: 0.0
  sigmasrc_kms: 100.0
  sigmaran_kms: 100.0
  mass_conservation: true
  outer_radius_box: 0.4
  disk_on: true
  disk_radius_box: 0.04
  disk_height_box: 0.004
  disk_tau_dust: 0.0
  disk_sigma_kms: 50.0
  source: point

# ---- THOR runner: x86-64 build mounted into the thor-ci-python image (from pilot_mac.yaml) ----
thor:
  mode: docker
  image: thor-ci-python:local
  thor_bin: /thor/cmake-build-release-omp/src/thor
  extra_args:
    - "--platform"
    - "linux/amd64"
    - "--memory=14g"
    - "-v"
    - "/Users/jarvis/Documents/thor/branches/biconical_model:/thor"
    - "-e"
    - "ACPP_VISIBILITY_MASK=omp"
    - "-e"
    - "LD_LIBRARY_PATH=/thor/cmake-build-release-omp/_deps/yaml-cpp-build"

device: auto
