# PILOT (Sherlock) — spaxel-cube extraction de-risk + photon-budget / grid freeze.
#
# The 1M-photon arm of the pilot: the SAME 15 transports (same seed/design) as
# configs/pilot_spaxel.yaml, at 3.3x the photon budget — a PAIRED comparison of per-cell
# MC S/N vs cost, so scripts/spaxel_pilot_diag.py can freeze the production photon budget.
# Everything else (grid, priors, geometry) is byte-identical to pilot_spaxel.yaml.
#
#   .venv/bin/python -m biconical_inference.sample --config configs/pilot_spaxel_1m.yaml

library:
  root: $SCRATCH/bicone_pilot_spaxel_1m
  out:  $SCRATCH/bicone_pilot_spaxel_1m/library_pilot_spaxel_1m.h5
  n_sims: 15                           # transport runs (rows = 15 * n_los)
  method: lhs
  seed: 1
  incl_seed: 2
  n_los: 6                             # production K
  n_cont: 1000000                      # 3.3x the proven budget — the halo-statistics lever
  n_line: 0
  want_mc_var: true
  cleanup_outputs: true                # raw peel h5 never leaves the compute node
  cube:
    extent_kpc: 100.0                  # wind outer radius = 0.4 * 250 kpc box = 100 kpc;
                                       #   nothing exists beyond it, so the FOV stops there
    nx: 48                             # finest candidate; analysis block-sums to 24/16/12
    vel_rebin: 1                       # native 256 bins; analysis sums to 128/64

thor:
  mode: native
  thor_bin: $HOME/thor_acpp.sh         # apptainer wrapper (same as the 2ap production run)

free_params: [logN, theta, av, incl, vexp_kms, disk_logN]
param_bounds:
  logN:      [11.0, 16.0]
  theta:     [15.0, 82.0]
  av:        [0.5,  2.0]
  incl:      [0.0,  90.0]
  vexp_kms:  [50.0, 600.0]
  disk_logN: [13.0, 16.0]

fixed:
  nphotons_step_max: 250000   # stream 1M photons in 4 steps: single-step THOR at 1M holds
                              #   all photon state + 6-LOS peel buffers at once and OOM'd
                              #   24G nodes (pilot array 34229898 tasks 5-9, exit -9)
  ew: 0.0
  sigmasrc_kms: 100.0
  sigmaran_kms: 100.0
  mass_conservation: true
  outer_radius_box: 0.4
  disk_on: true
  disk_radius_box: 0.04
  disk_height_box: 0.004
  disk_tau_dust: 0.0
  disk_sigma_kms: 50.0
  source: point

device: auto
