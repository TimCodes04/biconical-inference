# Sherlock production — SPAXEL-CUBE biconical MgII training library (schema v3).
#
# The IFU successor to configs/sherlock_2ap.yaml: each transport is peeled to n_los
# inclinations and extracted to an (nx, nx, nvel) spaxel cube + the 1-D r_vir channel
# (for the cube-vs-1D A/B), one compressed spectrum.npz marker per run. Raw peel HDF5
# never leaves the compute node. Aggregate ON SHERLOCK (library.py streams cubes without
# RAM-stacking), then copy ONLY library_spaxel.h5 home via the DTN.
#
# >>> FROZEN FROM THE PILOT (validation/spaxel_pilot/pilot_report.json) — verify before
# >>> submitting: n_sims, n_cont, cube.nx, cube.vel_rebin, and the sbatch --time.
#
# Generate -> aggregate -> reserve:
#   sbatch scripts/sbatch_sherlock_spaxel.sh
#   .venv/bin/python -m biconical_inference.library --config configs/sherlock_spaxel.yaml
#   .venv/bin/python -m biconical_inference.splits  --config configs/sherlock_spaxel.yaml
#   # Mac: rsync -av --progress sherlock:$SCRATCH/bicone_spaxel/library_spaxel.h5 library/
#   #      (large file: use dtn.sherlock.stanford.edu; $SCRATCH purges at 90 days)

library:
  root: $SCRATCH/bicone_spaxel
  out:  $SCRATCH/bicone_spaxel/library_spaxel.h5
  n_sims: 10000                        # transport RUNS (rows = n_sims * n_los) — pilot-frozen
  method: lhs
  seed: 3                              # FRESH design (2ap used seed 1; a new draw, new split)
  incl_seed: 4
  n_los: 6
  n_cont: 1000000                      # PILOT-FROZEN: 3.3x the halo photons for +25% median
                                       #   wall time (360s vs 288s — transport is overhead-
                                       #   dominated); halo cells go ~1 -> ~2 photons and the
                                       #   photon count is the only S/N lever the pilot found
  n_line: 0
  want_mc_var: true
  cleanup_outputs: true
  cube:
    extent_kpc: 60.0                   # PILOT-FROZEN: the scattered halo is compact — median
                                       #   r90 of off-center flux = 11 kpc, r99 = 21 kpc; the
                                       #   most extended pilot run (logN 15.8, theta 68) has
                                       #   r99 = 80 kpc with ~1% of halo flux beyond 60. The
                                       #   wind's 100-kpc outskirts never receive a photon.
    nx: 24                             # 5 kpc cells (~0.7 arcsec at z~0.7 — seeing-matched);
                                       #   halo r90 spans ~2-3 cells, r99 ~4-5
    vel_rebin: 4                       # 256 -> 64 velocity bins (53 km/s, ~MUSE LSF scale)

thor:
  mode: native
  thor_bin: $HOME/thor_acpp.sh

splits: splits/reserved_test_spaxel.json

free_params: [logN, theta, av, incl, vexp_kms, disk_logN]
param_bounds:
  logN:      [11.0, 16.0]
  theta:     [15.0, 82.0]
  av:        [0.5,  2.0]
  incl:      [0.0,  90.0]
  vexp_kms:  [50.0, 600.0]
  disk_logN: [13.0, 16.0]

fixed:
  nphotons_step_max: 250000   # bound THOR's per-step memory independent of n_cont (the 1M
                              #   pilot arm OOM'd 24G nodes single-step); harmless at 300k
  ew: 0.0
  sigmasrc_kms: 100.0
  sigmaran_kms: 100.0
  mass_conservation: true
  outer_radius_box: 0.4
  disk_on: true
  disk_radius_box: 0.04
  disk_height_box: 0.004
  disk_tau_dust: 0.0
  disk_sigma_kms: 50.0
  source: point

device: auto
