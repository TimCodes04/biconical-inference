# PILOT (Sherlock) — spaxel-cube extraction de-risk + photon-budget / grid freeze.
#
# 15 transports x 6 LOS at the PRODUCTION photon budget (300k), extracted at the FINEST
# candidate cube grid (nx=48 over +/-100 kpc, native 256 velocity bins). The analysis
# (scripts/spaxel_pilot_diag.py, run on the Mac against the copied-home spectrum.npz
# markers) block-sums this down to every coarser candidate (nx 24/16/12 x nvel 128/64)
# to measure per-cell MC S/N vs radius and freeze (nx, nvel, extent, photons, n_sims)
# for configs/sherlock_spaxel.yaml. configs/pilot_spaxel_1m.yaml is the SAME design
# (same seed -> same transports) at 1M photons for a paired budget comparison.
#
#   .venv/bin/python -m biconical_inference.sample --config configs/pilot_spaxel.yaml

library:
  root: $SCRATCH/bicone_pilot_spaxel_300k
  out:  $SCRATCH/bicone_pilot_spaxel_300k/library_pilot_spaxel_300k.h5
  n_sims: 15                           # transport runs (rows = 15 * n_los)
  method: lhs
  seed: 1
  incl_seed: 2
  n_los: 6                             # production K
  n_cont: 300000                       # the proven 1-D budget — is it enough per CELL?
  n_line: 0
  want_mc_var: true
  cleanup_outputs: true                # raw peel h5 never leaves the compute node
  cube:
    extent_kpc: 100.0                  # wind outer radius = 0.4 * 250 kpc box = 100 kpc;
                                       #   nothing exists beyond it, so the FOV stops there
    nx: 48                             # finest candidate; analysis block-sums to 24/16/12
    vel_rebin: 1                       # native 256 bins; analysis sums to 128/64

thor:
  mode: native
  thor_bin: $HOME/thor_acpp.sh         # apptainer wrapper (same as the 2ap production run)

free_params: [logN, theta, av, incl, vexp_kms, disk_logN]
param_bounds:
  logN:      [11.0, 16.0]
  theta:     [15.0, 82.0]
  av:        [0.5,  2.0]
  incl:      [0.0,  90.0]
  vexp_kms:  [50.0, 600.0]
  disk_logN: [13.0, 16.0]

fixed:
  ew: 0.0
  sigmasrc_kms: 100.0
  sigmaran_kms: 100.0
  mass_conservation: true
  outer_radius_box: 0.4
  disk_on: true
  disk_radius_box: 0.04
  disk_height_box: 0.004
  disk_tau_dust: 0.0
  disk_sigma_kms: 50.0
  source: point

device: auto
