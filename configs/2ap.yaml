# TWO-APERTURE + MULTI-LOS model — LOCAL training + app config.
#
# Companion to configs/sherlock_2ap.yaml (which GENERATES the library on the cluster). This
# config TRAINS the 2-channel emulator + NPE on the pulled-back library and drives the app.
# Two apertures (20 kpc + r_vir) per observation; disk_logN is a free parameter; sigma_ran is
# fixed at 100 km/s. The library/training contract MUST match configs/sherlock_2ap.yaml.
#
# Pipeline once library/library_2ap.h5 is present:
#   python -m biconical_inference.splits         --config configs/2ap.yaml
#   python -m biconical_inference.emulator.train  --config configs/2ap.yaml
#   python -m biconical_inference.npe.train_npe   --config configs/2ap.yaml
#   python scripts/validate_holdout.py            --config configs/2ap.yaml

# ---- training-library (pulled back from Sherlock) ----
library:
  root: ./runs_2ap                    # only used if you also generate locally (docker)
  out: ./library/library_2ap.h5       # the handoff file from Sherlock
  n_sims: 30000                       # number of transport runs (rows = n_sims * n_los)
  method: lhs
  seed: 1
  incl_seed: 2
  n_los: 6
  n_cont: 300000
  n_line: 0
  aperture_kpc: [20.0, 138.1]
  want_mc_var: true

# THOR runner (only used for optional LOCAL docker generation; training needs no THOR).
thor:
  mode: docker
  image: thor-ci-python:local
  thor_bin: thor

# ---- 6 free (inferred) parameters + their constrained physical ranges ----
free_params: [logN, theta, av, incl, vexp_kms, disk_logN]
param_bounds:
  logN:      [11.0, 16.0]
  theta:     [15.0, 82.0]
  av:        [0.5,  2.0]
  incl:      [0.0,  90.0]
  vexp_kms:  [50.0, 600.0]
  disk_logN: [13.0, 16.0]    # MUST match configs/sherlock_2ap.yaml (the library was generated
                             #   with the 1e16 cap); the NPE prior is Prior.from_config(cfg), so a
                             #   [13,17] here would span support the library never covered (inv #1).

# ---- fixed (not inferred) — MUST match configs/sherlock_2ap.yaml ----
fixed:
  ew: 0.0
  sigmasrc_kms: 100.0
  sigmaran_kms: 100.0       # WIND random velocity — FIXED
  mass_conservation: true
  outer_radius_box: 0.4
  disk_on: true
  disk_radius_box: 0.04
  disk_height_box: 0.004    # 1 kpc thick
  disk_tau_dust: 0.0
  disk_sigma_kms: 50.0
  source: point

# ---- emulator (params -> 2-aperture spectrum) ----
emulator:
  arch: cnn
  hidden: 256
  latent_ch: 64
  heteroscedastic: true
  epochs: 400
  batch_size: 256
  lr: 0.001
  val_frac: 0.1
  test_frac: 0.1
  ckpt: ./checkpoints/emulator_2ap.pt

# ---- NPE (2-aperture spectrum -> posterior) ----
npe:
  density_estimator: nsf
  embedding_features: 24
  hidden_features: 128
  num_transforms: 6
  train_source: library     # train on TRUE THOR spectra + real MC noise (closes the emu gap)
  n_amortized_sims: 400000
  batch_size: 1024
  lr: 0.0005
  stop_after_epochs: 20
  max_num_epochs: 300
  instrument_conditioned: true
  seed: 0
  obs_noise_snr: 30
  ckpt: ./checkpoints/npe_2ap.pt

device: auto
